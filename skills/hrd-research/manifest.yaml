name: hrd-research
version: 2.4.0
description: >
  Router manifest for HRD research writing, citation/reference checking, and visualization. SKILL.md uses this file to
  decide which reusable guidance fragments to load for developing a paper from
  scratch, drafting, revision, restructuring, review, citation/reference checks,
  journal-fit, graph, chart, table, or figure-interpretation request.

always_load:
  - ../_shared/apa-7.md
  - ../_shared/hrd-domain.md
  - static/core/citation-integrity.md
  - static/core/stance.md
  - static/core/workflow.md
  - static/core/output-format.md

axes:
  task:
    detect: >
      Decide what kind of research work the user is asking for. Use build-paper
      when the user wants to develop a paper from an idea, data, notes,
      materials, findings, or partial plan. Use polish for
      local clarity, style, APA, or sentence-level revision. Use draft for new
      text. Use restructure for organization, flow, or argument rebuilding.
      Use review for critique, readiness checks, or reviewer-facing assessment.
      Use visualize for graph or chart creation, interpret-visual for explaining
      an existing visualization, and table for APA-style tables.
    values:
      build-paper: static/fragments/task/build-paper.md
      polish: static/fragments/task/polish.md
      draft: static/fragments/task/draft.md
      restructure: static/fragments/task/restructure.md
      review: static/fragments/task/review.md
      visualize: static/fragments/task/visualize.md
      interpret-visual: static/fragments/task/interpret-visual.md
      table: static/fragments/task/table.md
    default: polish
    multi: false

  genre:
    detect: >
      Identify the manuscript type. Use empirical for studies with data,
      conceptual for theory or model-building manuscripts, review for
      integrative/systematic/scoping reviews, methods for method-focused work,
      and generic when the type is unclear or not important.
    values:
      empirical: static/fragments/genre/empirical.md
      conceptual: static/fragments/genre/conceptual.md
      review: static/fragments/genre/review.md
      methods: static/fragments/genre/methods.md
      generic: static/fragments/genre/generic.md
    default: generic
    multi: false

  section:
    detect: >
      Identify the manuscript section the user wants drafted or revised. The
      user may name one or several sections. Use reviewer-facing for response
      letters, reviewer comments, cover letters, or revision memos.
    values:
      abstract: static/fragments/section/abstract.md
      introduction: static/fragments/section/introduction.md
      literature-review: static/fragments/section/literature-review.md
      theory: static/fragments/section/theory.md
      methods: static/fragments/section/methods.md
      rq-hypotheses: static/fragments/section/rq-hypotheses.md
      discussion: static/fragments/section/discussion.md
      implications: static/fragments/section/implications.md
      conclusion: static/fragments/section/conclusion.md
      reviewer-facing: static/fragments/section/reviewer-facing.md
    multi: true

  journal:
    detect: >
      Use the target journal named by the user. Map Human Resource Development
      Quarterly to hrdq, Human Resource Development Review to hrdr, Advances in
      Developing Human Resources to adhr, and Human Resource Development
      International to hrdi. Use generic when the journal is unclear.
    values:
      generic: static/fragments/journal/generic.md
      hrdq: static/fragments/journal/hrdq.md
      hrdr: static/fragments/journal/hrdr.md
      adhr: static/fragments/journal/adhr.md
      hrdi: static/fragments/journal/hrdi.md
    default: generic
    multi: false

  citation:
    detect: >
      Use this axis when the user asks about citations, in-text citations,
      references, bibliography, reference list, cited works, DOI, APA reference
      entries, missing citations, uncited references, or citation/reference
      consistency. Use in-text-integrity for claim-to-citation placement,
      reference-list-check for reference-list completeness and entry quality,
      citation-reference-match for matching in-text citations to reference
      entries in both directions, and apa-reference-format for APA 7 formatting
      of reference entries.
    values:
      in-text-integrity: static/fragments/citation/in-text-integrity.md
      reference-list-check: static/fragments/citation/reference-list-check.md
      citation-reference-match: static/fragments/citation/citation-reference-match.md
      apa-reference-format: static/fragments/citation/apa-reference-format.md
    multi: true

  visualization:
    detect: >
      Use this axis when the user asks for a graph, chart, figure, table,
      figure title, figure note, caption, visualization critique, or a
      paragraph interpreting a visual. Use chart-choice when selecting a chart
      type, apa-figure for figure formatting or captions, apa-table for table
      formatting, code-guidance when code or tool instructions are requested,
      and narrative when writing about a visual in manuscript prose.
    values:
      chart-choice: static/fragments/visualization/chart-choice.md
      apa-figure: static/fragments/visualization/apa-figure.md
      apa-table: static/fragments/visualization/apa-table.md
      code-guidance: static/fragments/visualization/code-guidance.md
      narrative: static/fragments/visualization/narrative.md
    multi: true

  paper-development:
    detect: >
      Use this axis when the user asks to build a manuscript from scratch,
      create a paper plan, turn ideas or data into a paper, develop the
      central contribution, map evidence to claims, or create section
      blueprints. Use motivation for the central contribution, architecture
      for the whole-paper argument arc, evidence-bank for claim-to-evidence
      mapping, section-blueprint for section-by-section planning, and
      drafting-plan for staged drafting.
    values:
      motivation: static/fragments/paper-development/motivation.md
      architecture: static/fragments/paper-development/architecture.md
      evidence-bank: static/fragments/paper-development/evidence-bank.md
      section-blueprint: static/fragments/paper-development/section-blueprint.md
      drafting-plan: static/fragments/paper-development/drafting-plan.md
    multi: true

references:
  on_demand:
    - condition: revising or evaluating prose quality
      path: references/revision-checklist.md
    - condition: checking references, reference-list quality, or citation/reference consistency
      path: references/reference-checklist.md
    - condition: creating, formatting, or interpreting figures and tables
      path: references/visualization-checklist.md
    - condition: developing a paper from scratch, planning a whole manuscript, or mapping evidence to claims
      path: references/paper-development-checklist.md
